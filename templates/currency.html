<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelGo — Currency Converter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .converter-box {
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      max-width: 560px;
      margin: 0 auto 2rem;
      backdrop-filter: blur(14px);
    }
    .amount-display {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 800;
      color: var(--teal);
      text-align: center;
      margin: 1rem 0;
      letter-spacing: -1px;
    }
    .currency-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .currency-row select { flex: 1; margin: 0; }
    .currency-row input { flex: 1.5; margin: 0; font-size: 1.1rem; }
    .swap-btn {
      background: var(--teal-dim);
      border: 1px solid rgba(0,229,197,0.3);
      border-radius: 50%;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.2rem;
      transition: all 0.3s; flex-shrink: 0;
    }
    .swap-btn:hover { background: rgba(0,229,197,0.25); transform: rotate(180deg); }
    .rate-badge {
      background: var(--lime-dim);
      border: 1px solid rgba(184,255,87,0.2);
      border-radius: var(--radius-md);
      padding: 0.75rem 1.25rem;
      text-align: center;
      margin: 1rem 0;
    }
    .rate-text { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--lime); }
    .popular-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
      gap: 1rem;
      max-width: 760px;
      margin: 0 auto 2rem;
    }
    .popular-card {
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      backdrop-filter: blur(10px);
    }
    .popular-card:hover { border-color: var(--border-hover); transform: translateY(-4px); }
    .popular-card .flag { font-size: 1.8rem; margin-bottom: 0.4rem; display: block; }
    .popular-card .cur-code { font-family: var(--font-display); font-weight: 700; color: var(--teal); }
    .popular-card .cur-rate { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.2rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">✦ TravelGo</div>
    <div class="nav-links">
      <a href="/dashboard" class="btn btn-secondary">Dashboard</a>
      <a href="/logout" class="btn btn-secondary">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div class="hero" style="padding-bottom:1.5rem;">
      <span class="tag">✦ Finance</span>
      <h1>Currency Converter</h1>
      <p>Convert currencies instantly before your trip</p>
    </div>

    <div class="converter-box">
      <h3 style="font-family:var(--font-display); color:var(--teal); margin-bottom:1.5rem;">Convert Currency</h3>

      <div class="currency-row">
        <select id="fromCur" onchange="convert()">
          <option value="USD">🇺🇸 USD — US Dollar</option>
          <option value="EUR">🇪🇺 EUR — Euro</option>
          <option value="GBP">🇬🇧 GBP — British Pound</option>
          <option value="INR">🇮🇳 INR — Indian Rupee</option>
          <option value="JPY">🇯🇵 JPY — Japanese Yen</option>
          <option value="AED">🇦🇪 AED — UAE Dirham</option>
          <option value="SGD">🇸🇬 SGD — Singapore Dollar</option>
          <option value="AUD">🇦🇺 AUD — Australian Dollar</option>
          <option value="THB">🇹🇭 THB — Thai Baht</option>
          <option value="IDR">🇮🇩 IDR — Indonesian Rupiah</option>
        </select>
        <input type="number" id="fromAmt" value="100" min="0" oninput="convert()">
      </div>

      <div style="text-align:center; margin: 0.5rem 0;">
        <button class="swap-btn" onclick="swapCurrencies()" title="Swap">⇅</button>
      </div>

      <div class="currency-row">
        <select id="toCur" onchange="convert()">
          <option value="INR">🇮🇳 INR — Indian Rupee</option>
          <option value="USD">🇺🇸 USD — US Dollar</option>
          <option value="EUR">🇪🇺 EUR — Euro</option>
          <option value="GBP">🇬🇧 GBP — British Pound</option>
          <option value="JPY">🇯🇵 JPY — Japanese Yen</option>
          <option value="AED">🇦🇪 AED — UAE Dirham</option>
          <option value="SGD">🇸🇬 SGD — Singapore Dollar</option>
          <option value="AUD">🇦🇺 AUD — Australian Dollar</option>
          <option value="THB">🇹🇭 THB — Thai Baht</option>
          <option value="IDR">🇮🇩 IDR — Indonesian Rupiah</option>
        </select>
        <input type="number" id="toAmt" readonly style="color:var(--lime); font-size:1.1rem;">
      </div>

      <div class="rate-badge">
        <p class="rate-text" id="rateText">1 USD = 83.12 INR</p>
        <p style="font-size:0.75rem; color:var(--text-muted); margin-top:0.25rem;">Indicative rates · Updated today</p>
      </div>

      <button class="btn btn-primary" style="width:100%;" onclick="convert()">Convert Now</button>
    </div>

    <!-- Popular currencies vs USD -->
    <h2 class="section-title" style="text-align:center; margin-bottom:1rem;">Popular Travel Currencies</h2>
    <div class="popular-grid" id="popularGrid"></div>

    <div style="text-align:center; margin-top:2rem;">
      <a href="/dashboard" class="btn btn-secondary">← Back to Dashboard</a>
    </div>
  </div>

  <script>
    const rates = {
      USD:1, EUR:0.92, GBP:0.79, INR:83.12, JPY:149.5,
      AED:3.67, SGD:1.34, AUD:1.53, THB:35.8, IDR:15600
    };

    const flags = { USD:'🇺🇸', EUR:'🇪🇺', GBP:'🇬🇧', INR:'🇮🇳', JPY:'🇯🇵', AED:'🇦🇪', SGD:'🇸🇬', AUD:'🇦🇺', THB:'🇹🇭', IDR:'🇮🇩' };
    const names = { USD:'US Dollar', EUR:'Euro', GBP:'Brit. Pound', INR:'Ind. Rupee', JPY:'Japanese Yen', AED:'UAE Dirham', SGD:'SG Dollar', AUD:'AUS Dollar', THB:'Thai Baht', IDR:'Indo. Rupiah' };

    function convert() {
      const from = document.getElementById('fromCur').value;
      const to   = document.getElementById('toCur').value;
      const amt  = parseFloat(document.getElementById('fromAmt').value) || 0;
      const result = (amt / rates[from]) * rates[to];
      document.getElementById('toAmt').value = result.toFixed(2);
      const rate = (rates[to] / rates[from]).toFixed(4);
      document.getElementById('rateText').textContent = `1 ${from} = ${rate} ${to}`;
    }

    function swapCurrencies() {
      const f = document.getElementById('fromCur');
      const t = document.getElementById('toCur');
      const tmp = f.value; f.value = t.value; t.value = tmp;
      convert();
    }

    // Popular grid
    const grid = document.getElementById('popularGrid');
    const popular = ['EUR','GBP','JPY','AED','SGD','AUD','THB','INR'];
    popular.forEach(cur => {
      const rate = rates[cur].toFixed(cur === 'JPY' || cur === 'IDR' ? 0 : 2);
      const card = document.createElement('div');
      card.className = 'popular-card';
      card.innerHTML = `<span class="flag">${flags[cur]}</span><div class="cur-code">${cur}</div><div style="font-size:0.88rem;color:var(--text-secondary);margin:0.2rem 0;">${names[cur]}</div><div class="cur-rate">1 USD = ${rate} ${cur}</div>`;
      card.onclick = () => { document.getElementById('toCur').value = cur; convert(); };
      grid.appendChild(card);
    });

    convert();
  </script>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
