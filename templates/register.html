<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelGo — Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">✦ TravelGo</div>
    <div class="nav-links">
      <a href="/" class="btn btn-secondary">← Home</a>
    </div>
  </nav>

  <div class="container">
    <div class="form-container">
      <h2>Start Your Journey</h2>
      <p style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.95rem;">Create your free TravelGo account</p>

      <form method="POST">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a strong password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.75rem; padding: 0.9rem;">Create Account</button>
      </form>

      <div class="divider"></div>

      <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
        Already have an account? <a href="/login" class="link">Sign in</a>
      </p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
